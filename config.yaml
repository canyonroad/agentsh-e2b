# agentsh server configuration for E2B sandbox
# Extends default config with settings optimized for E2B environment

server:
  http:
    addr: "127.0.0.1:18080"
    read_timeout: "30s"
    write_timeout: "60s"
    max_request_size: "10MB"
  grpc:
    enabled: true
    addr: "127.0.0.1:9090"

auth:
  type: "none"

logging:
  level: "info"
  format: "text"
  output: "stderr"

sessions:
  base_dir: "/var/lib/agentsh/sessions"
  max_sessions: 100
  default_timeout: "1h"
  default_idle_timeout: "15m"
  cleanup_interval: "5m"

audit:
  enabled: true
  storage:
    sqlite_path: "/var/lib/agentsh/events.db"

sandbox:
  enabled: true
  allow_degraded: true  # Allow running in E2B without all features

  limits:
    max_memory_mb: 4096
    max_cpu_percent: 100
    max_processes: 256

  # FUSE filesystem for file operation interception
  # Detected as available in E2B
  fuse:
    enabled: true
    deferred: true
    deferred_marker_file: "/tmp/.agentsh-fuse-enabled"
    deferred_enable_command: ["sudo", "/bin/chmod", "666", "/dev/fuse"]
    audit:
      enabled: true
      mode: "soft_delete"
      trash_path: ".agentsh_trash"
      ttl: "24h"
      quota: "1GB"

  network:
    enabled: true
    intercept_mode: "all"
    proxy_listen_addr: "127.0.0.1:0"

  # Cgroups v2 - not available in E2B (v0.18.0 pre-flight check fails)
  cgroups:
    enabled: false

  # Seccomp - syscall blocking (dangerous syscalls killed at kernel level)
  seccomp:
    enabled: true
    file_monitor:
      enabled: false  # E2B lacks Yama PR_SET_PTRACER support; ProcessVMReadv fails

  # Unix socket wrapper - disabled: ptrace with network tracing requires this off
  unix_sockets:
    enabled: false

  # Ptrace - kernel-level network syscall interception (connect, bind, sendto)
  # Replaces eBPF network enforcement which is unavailable in E2B (no CAP_BPF)
  # File/signal tracing disabled: Landlock + FUSE handle file protection
  ptrace:
    enabled: true
    attach_mode: "children"
    trace:
      execve: true
      file: false      # Landlock + FUSE handle file protection
      network: true    # Kernel-level network enforcement (the gap)
      signal: false
    performance:
      seccomp_prefilter: true  # Pre-filter irrelevant syscalls at kernel level
      max_tracees: 500
      max_hold_ms: 5000
    on_attach_failure: "fail_closed"  # Deny execution if ptrace can't attach

# Security mode - minimal (seccomp wraps per-command, not server-wide)
security:
  mode: minimal
  strict: false

# Capabilities as recommended by agentsh detect
capabilities:
  allow: []

proxy:
  mode: "embedded"
  port: 0
  providers:
    anthropic: "https://api.anthropic.com"
    openai: "https://api.openai.com"

dlp:
  mode: "redact"
  patterns:
    email: true
    phone: true
    credit_card: true
    ssn: true
    api_keys: true
  custom_patterns:
    - name: openai_key
      display: OPENAI_KEY
      regex: "sk-[a-zA-Z0-9]{48,}"
    - name: anthropic_key
      display: ANTHROPIC_KEY
      regex: "sk-ant-[a-zA-Z0-9-]{95,}"
    - name: aws_access_key
      display: AWS_KEY
      regex: "AKIA[0-9A-Z]{16}"
    - name: github_pat
      display: GITHUB_TOKEN
      regex: "ghp_[a-zA-Z0-9]{36}"
    - name: github_oauth
      display: GITHUB_OAUTH
      regex: "gho_[a-zA-Z0-9]{36}"
    - name: jwt_token
      display: JWT
      regex: "eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*"
    - name: private_key
      display: PRIVATE_KEY
      regex: "-----BEGIN [A-Z]+ PRIVATE KEY-----"
    - name: slack_token
      display: SLACK_TOKEN
      regex: "xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}"

policies:
  dir: "/etc/agentsh/policies"
  default: "default"
  env_shim_path: "/usr/lib/agentsh/libenvshim.so"

approvals:
  enabled: false
  mode: "async"
  timeout: "5m"

metrics:
  enabled: true
  path: "/metrics"

health:
  path: "/health"
  readiness_path: "/ready"

development:
  disable_auth: true
  verbose_errors: false
